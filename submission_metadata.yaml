# ============================================================================
# AI tools declaration
# ============================================================================
ai_tools_used:
  - "Gemini"        

ai_usage_summary: |
  Used Gemini as an agentic coding assistant to design the pipeline architecture, 
  implement the bi-encoder retrieval, cross-encoder re-ranking, and rule-based scoring systems. 
  Gemini generated the python code, configuration, tests, and reasoning generation logic.

# ============================================================================
# Approach summary (optional but recommended)
# ============================================================================
methodology_summary: |
  RoleFit is a 4-stage pipeline that ranks 100K candidates under 20s on CPU.
  1. Bi-encoder retrieval (FAISS) fetches top-200 longlist in <0.1s.
  2. Cross-encoder scores the 200 pairs jointly against JD requirements.
  3. Rule-based scorer deterministically evaluates skill proficiency, career trajectory, behavioral availability, and detects honeypots.
  4. Composite scoring combines CE (30%), Skills (20%), Career (25%), and Behavior (25%). Honeypots are zeroed out and excluded from the top-100.
  5. Deterministic, template-based reasoning explains the strengths and weaknesses of each candidate without LLM inference overhead.

